<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Хомяки: Башня Обороны</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1e3d;
      color: white;
      margin: 0;
      padding: 10px;
      text-align: center;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { margin: 10px 0; }

    .menu button {
      padding: 12px 20px;
      margin: 8px;
      font-size: 18px;
      border-radius: 12px;
      background: #ffcc00;
      color: black;
    }

    /* Поле боя */
    #battle-field {
      position: relative;
      width: 100%;
      max-width: 650px;
      height: 420px;
      background: linear-gradient(#1e4d2b, #2e7a3f);
      border: 4px solid #555;
      margin: 15px auto;
      overflow: hidden;
      border-radius: 12px;
    }

    /* Тропинка */
    .path {
      position: absolute;
      background: #3d2b1f;
      width: 80px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
    }

    .slot {
      position: absolute;
      width: 55px;
      height: 55px;
      background: rgba(80,80,80,0.85);
      border: 3px solid #aaa;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }

    .enemy {
      position: absolute;
      font-size: 35px;
      transition: left 0.8s linear;
    }

    .info {
      margin: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐹 Хомяки: Башня Обороны</h1>

    <div id="main-menu">
      <p>Золото: <span id="gold">200</span> 🪙 | Эпизод: <span id="episode">1</span></p>
      <p>🏰 Башня: <span id="tower-hp">100</span> ❤️</p>

      <div class="menu">
        <button onclick="showShop()">🛒 Магазин</button>
        <button onclick="showInventory()">🎒 Инвентарь</button>
        <button onclick="enterBattle()" style="background:#ff4444;color:white;">🛡️ Защитить башню</button>
      </div>
    </div>

    <!-- Поле боя -->
    <div id="battle-screen" style="display:none;">
      <div class="info">
        Волна: <span id="wave-info">1</span> | Врагов осталось: <span id="enemies-left">10</span>
      </div>

      <div id="battle-field">
        <div class="path"></div>

        <!-- Слоты для хомяков (слева и справа) -->
        <div class="slot" style="left:80px; top:80px;"  onclick="placeHamster(0)"></div>
        <div class="slot" style="left:80px; top:180px;" onclick="placeHamster(1)"></div>
        <div class="slot" style="left:80px; top:280px;" onclick="placeHamster(2)"></div>

        <div class="slot" style="right:80px; top:80px;"  onclick="placeHamster(3)"></div>
        <div class="slot" style="right:80px; top:180px;" onclick="placeHamster(4)"></div>
        <div class="slot" style="right:80px; top:280px;" onclick="placeHamster(5)"></div>
      </div>

      <button onclick="startWave()" style="background:#ff4444;color:white;padding:12px 30px;font-size:20px;">▶️ Начать волну</button>
      <button onclick="exitBattle()" style="margin-left:10px;">🔙 Выйти</button>
    </div>

    <!-- Магазин и Инвентарь (можно оставить как раньше) -->
  </div>

  <script>
    let gold = 200;
    let episode = 1;
    let towerHP = 100;
    let hamsters = { warrior: 2, archer: 1 }; // количество в инвентаре
    let placedHamsters = []; // размещённые на поле

    const hamsterTypes = {
      warrior: { name: "⚔️", dmg: 15 },
      archer: { name: "🏹", dmg: 25 },
      mage: { name: "🔥", dmg: 40 }
    };

    function updateMainUI() {
      document.getElementById("gold").textContent = gold;
      document.getElementById("episode").textContent = episode;
      document.getElementById("tower-hp").textContent = towerHP;
    }

    function enterBattle() {
      document.getElementById("main-menu").style.display = "none";
      document.getElementById("battle-screen").style.display = "block";
      placedHamsters = [];
      document.querySelectorAll('.slot').forEach(slot => slot.innerHTML = '');
      updateMainUI();
    }

    function exitBattle() {
      document.getElementById("battle-screen").style.display = "none";
      document.getElementById("main-menu").style.display = "block";
    }

    function placeHamster(index) {
      let types = Object.keys(hamsters);
      let available = types.filter(t => hamsters[t] > 0);

      if (available.length === 0) {
        alert("Нет хомяков в инвентаре!");
        return;
      }

      let choice = prompt("Какого хомяка поставить?\n" +
        available.map(t => `- ${hamsterTypes[t].name} (${t})`).join("\n"),
        available[0]);

      if (choice && hamsters[choice] > 0) {
        hamsters[choice]--;
        placedHamsters[index] = choice;
        document.querySelectorAll('.slot')[index].innerHTML = hamsterTypes[choice].name;
      }
    }

    function startWave() {
      let enemiesLeft = 10;
      document.getElementById("enemies-left").textContent = enemiesLeft;

      let field = document.getElementById("battle-field");
      let wave = 1;
      document.getElementById("wave-info").textContent = wave;

      let interval = setInterval(() => {
        if (enemiesLeft <= 0) {
          clearInterval(interval);
          alert("🎉 Волна пройдена! +80 золота");
          gold += 80;
          episode++;
          updateMainUI();
          exitBattle();
          return;
        }

        // Создаём врага
        let enemy = document.createElement("div");
        enemy.className = "enemy";
        enemy.textContent = "🐛";
        enemy.style.left = "50%";
        enemy.style.top = Math.random() * 300 + 50 + "px";
        field.appendChild(enemy);

        // Движение врага
        setTimeout(() => {
          enemy.style.left = "calc(50% - 200px)";
        }, 100);

        setTimeout(() => {
          if (enemy.parentNode) enemy.parentNode.removeChild(enemy);
          enemiesLeft--;
          document.getElementById("enemies-left").textContent = enemiesLeft;
        }, 3000);

      }, 600);
    }

    // Запуск
    updateMainUI();
  </script>
</body>
</html>
