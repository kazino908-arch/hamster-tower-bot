<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamster Defense</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main-menu">
    <div class="menu-panel">
      <h1>🐹 HAMSTER DEFENSE</h1>
      <p id="menu-subtitle">Defend the hamster castle</p>
      <div class="menu-coins">🪙 <span id="menu-coin-count">0</span></div>
      <div class="layout-switch" aria-label="Режим экрана">
        <button id="layout-pc-btn" onclick="setLayoutMode('pc')">ПК</button>
        <button id="layout-phone-btn" onclick="setLayoutMode('phone')">Телефон</button>
      </div>
      <div class="menu-actions">
        <button id="play-btn" onclick="openLevelMenu()">🛡️ Play</button>
        <button id="inventory-btn" onclick="openInventory()">🎒 Inventory</button>
        <button id="shop-btn" onclick="openShop()">🛒 Shop</button>
        <button id="language-btn" onclick="toggleLanguage()">🇺🇦 Українська мова</button>
      </div>
    </div>
  </div>

  <div class="modal" id="level-modal">
    <div class="modal-panel">
      <h2 id="level-title">Level Select</h2>
      <div class="level-grid" id="level-grid"></div>
      <button id="level-back-btn" onclick="closeLevelMenu()">Back</button>
    </div>
  </div>

  <div class="modal" id="inventory-modal">
    <div class="modal-panel">
      <h2 id="inventory-title">Inventory</h2>
      <div class="inventory-grid" id="inventory-grid"></div>
      <div id="inventory-message">Tap a hamster to add it to the deck.</div>
      <div class="confirm-row" id="deck-confirm">
        <button id="confirm-yes-btn" onclick="confirmAddToDeck()">Yes</button>
        <button id="confirm-no-btn" onclick="cancelAddToDeck()">No</button>
      </div>
      <button id="inventory-close-btn" onclick="closeInventory()" style="margin-top:12px;">Close</button>
    </div>
  </div>

  <div class="modal" id="shop-modal">
    <div class="modal-panel">
      <h2 id="shop-title">Shop</h2>
      <div id="shop-content"></div>
      <button id="shop-close-btn" onclick="closeShop()">Close</button>
    </div>
  </div>

  <div id="battle-screen">
    <div id="battle-viewport">
      <div id="battle-field">
      <div class="sand-patch patch-a"></div>
      <div class="sand-patch patch-b"></div>
      <div class="sand-patch patch-c"></div>
      <div id="decor-layer"></div>

      <svg id="roads" viewBox="0 0 960 540" preserveAspectRatio="none" aria-hidden="true"></svg>
      <div id="map-grid" aria-hidden="true"></div>

      <div class="base-container">
        <div class="hp-bar-bg"><div id="hp-fill"></div></div>
        <img src="castle-removebg-preview.png" class="base-img" alt="">
      </div>

      <div id="wave-label">Level 1 | Wave 1/5</div>
      <div class="battle-top-buttons">
        <button id="speed-btn" onclick="toggleSpeed()">2x</button>
        <button id="skip-wave-btn" onclick="skipWave()" disabled>Skip</button>
      </div>
      <div class="upgrade-panel" id="upgrade-panel"></div>

      <div id="win-screen">
        <h2>Wave Cleared!</h2>
        <button onclick="nextWave()">Next Wave</button>
      </div>
    </div>

    </div>

    <div id="battle-hud">
      <div class="deck" aria-label="Колода">
        <div class="deck-card" id="deck-card-0"></div>
        <div class="deck-card" id="deck-card-1"></div>
        <div class="deck-card" id="deck-card-2"></div>
        <div class="deck-card" id="deck-card-3"></div>
        <div class="deck-card" id="deck-card-4"></div>
      </div>
      <div class="hud-side">
        <div class="coin-counter">🪙 <span id="coin-count">300</span></div>
        <button id="exit-menu-btn" onclick="exitToMenu()">Menu</button>
        <button id="start-btn" onclick="startWave()">▶️ Start Wave</button>
      </div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
