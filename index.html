<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamster Defense</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0b1e3d;
      color: white;
      margin: 0;
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
    }

    #main-menu {
      position: fixed;
      inset: 0;
      background: url('Gemini_Generated_Image_fv18ekfv18ekfv18.png') no-repeat center center;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .menu-panel {
      width: min(420px, calc(100vw - 28px));
      background: rgba(0, 0, 0, 0.78);
      padding: 30px;
      border-radius: 20px;
      border: 3px solid #f1c40f;
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.5);
    }

    .menu-panel h1 {
      font-size: 36px;
      margin: 0 0 12px;
      letter-spacing: 0;
      line-height: 1.05;
    }

    .menu-panel button,
    #start-btn,
    #exit-menu-btn,
    #win-screen button {
      padding: 14px 28px;
      font-size: 20px;
      color: #10213c;
      background: #f6f7fb;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.25);
    }

    #battle-screen {
      display: none;
      min-height: 100vh;
      padding: 12px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    #battle-screen.virtual-landscape {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vh;
      height: 100vw;
      min-height: 0;
      padding: 8px;
      transform: rotate(90deg) translateY(-100%);
      transform-origin: top left;
      background: #0b1e3d;
      z-index: 900;
    }

    #battle-viewport {
      position: relative;
      width: var(--game-width, 960px);
      height: var(--game-height, 540px);
      flex: 0 0 auto;
    }

    #battle-field {
      position: relative;
      width: 960px;
      height: 540px;
      transform: scale(var(--game-scale, 1));
      transform-origin: top left;
      background:
        radial-gradient(circle at 52% 50%, rgba(255, 246, 178, 0.2) 0 5%, transparent 6%),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(135deg, #315f4c, #7b6243 48%, #3a6a50);
      background-size: auto, 80px 80px, 80px 80px, auto;
      border: 0;
      outline: 6px solid #27313b;
      border-radius: 8px;
      overflow: hidden;
      cursor: crosshair;
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.5);
    }

    .sand-patch {
      position: absolute;
      background: #dfc88b;
      border: 3px solid #a9884e;
      opacity: 0.8;
      z-index: 0;
    }
    .patch-a { left: 6%; top: 6%; width: 19%; height: 34%; }
    .patch-b { left: 28%; top: 58%; width: 23%; height: 29%; }
    .patch-c { right: 7%; top: 16%; width: 18%; height: 48%; }

    #roads {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .road-base {
      fill: none;
      stroke: #b77b43;
      stroke-width: 78;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .road-mid {
      fill: none;
      stroke: #d8b16b;
      stroke-width: 58;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .road-edge {
      fill: none;
      stroke: rgba(102, 67, 36, 0.55);
      stroke-width: 4;
      stroke-dasharray: 12 16;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .base-container {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 190px;
      transform: translate(-50%, -50%);
      z-index: 8;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    .base-img {
      width: 100%;
      filter: drop-shadow(0 12px 8px rgba(0,0,0,0.45));
    }
    .hp-bar-bg {
      width: 150px;
      height: 12px;
      background: #201f1e;
      border: 2px solid #fff;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    #hp-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(to right, #ff4444, #ec1b1b);
      transition: width 0.25s;
    }

    .slot {
      position: absolute;
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 4px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .slot:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.72);
    }
    .slot img {
      width: 142%;
      height: 142%;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35));
    }
    .slot.road-cell {
      background: rgba(60, 38, 17, 0.08);
      border-color: transparent;
      cursor: default;
      pointer-events: none;
    }
    .slot.placed {
      border-color: transparent;
      background: transparent;
      cursor: default;
    }

    #selection-menu {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      gap: 10px;
      padding: 10px;
      background: rgba(8, 12, 18, 0.9);
      border: 2px solid white;
      border-radius: 10px;
      z-index: 200;
    }
    .select-card {
      width: 72px;
      min-height: 72px;
      padding: 5px;
      background: #41434a;
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px;
      color: white;
    }
    .select-card img {
      width: 100%;
      height: 48px;
      object-fit: contain;
      display: block;
    }

    .enemy {
      position: absolute;
      width: 48px;
      height: 54px;
      transform: translate(-50%, -50%);
      z-index: 7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-size: 32px;
      filter: drop-shadow(0 4px 2px rgba(0,0,0,0.35));
    }
    .enemy-hp {
      min-width: 24px;
      padding: 0 5px;
      background: rgba(0,0,0,0.82);
      color: #49ff58;
      border-radius: 4px;
      font-size: 11px;
      line-height: 16px;
      font-weight: 700;
    }

    .projectile-arrow {
      position: absolute;
      width: 34px;
      height: 34px;
      transform: translate(-50%, -50%);
      background: url('sparow.png') no-repeat center / contain;
      z-index: 30;
      pointer-events: none;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.35));
    }
    .attack-effect {
      position: absolute;
      width: 58px;
      height: 58px;
      transform: translate(-50%, -50%);
      background: url('sword.png') no-repeat center / contain;
      z-index: 31;
      pointer-events: none;
      animation: strike 0.34s forwards;
    }
    .hit-flash {
      position: absolute;
      width: 44px;
      height: 44px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,245,112,0.95), rgba(255,92,45,0.65) 48%, transparent 70%);
      z-index: 29;
      pointer-events: none;
      animation: pop 0.28s forwards;
    }
    @keyframes strike {
      from { opacity: 1; transform: translate(-50%, -50%) scale(0.5) rotate(-35deg); }
      to { opacity: 0; transform: translate(-50%, -50%) scale(1.9) rotate(25deg); }
    }
    @keyframes pop {
      from { opacity: 1; transform: translate(-50%, -50%) scale(0.35); }
      to { opacity: 0; transform: translate(-50%, -50%) scale(1.35); }
    }

    #start-btn {
      background: #28c76f;
      color: white;
      font-size: 18px;
      padding: 12px 30px;
    }
    #start-btn:disabled {
      opacity: 0.55;
      cursor: default;
    }

    #battle-hud {
      width: var(--game-width, 960px);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
    }

    .deck {
      display: grid;
      grid-template-columns: repeat(5, minmax(54px, 1fr));
      gap: 10px;
      padding: 10px;
      background: rgba(5, 14, 28, 0.78);
      border: 3px solid #27313b;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.34);
      align-self: start;
    }

    .deck-card {
      min-width: 54px;
      aspect-ratio: 3 / 4;
      border: 2px solid rgba(255,255,255,0.36);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04));
    }

    .hud-side {
      min-width: 170px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 8px;
    }

    .coin-counter {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(5, 14, 28, 0.84);
      border: 3px solid #f1c40f;
      border-radius: 10px;
      color: #ffe28a;
      font-size: 20px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(0,0,0,0.34);
    }

    #exit-menu-btn {
      padding: 10px 14px;
      background: #f6f7fb;
      color: #10213c;
      font-size: 16px;
    }

    #win-screen {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.92);
      border: 4px solid #f1c40f;
      padding: 22px;
      border-radius: 14px;
      z-index: 500;
      display: none;
    }

    @media (max-width: 700px) {
      #battle-screen {
        padding: 6px;
        justify-content: flex-start;
        gap: 7px;
      }
      .base-container { width: 145px; }
      .enemy { font-size: 26px; }
      #start-btn { font-size: 14px; padding: 8px 10px; }
      #battle-hud {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .deck {
        gap: 7px;
        padding: 8px;
      }
      .deck-card {
        min-width: 0;
        aspect-ratio: 5 / 4;
      }
      .hud-side {
        min-width: 0;
        grid-template-columns: 1fr 1fr 1.25fr;
        grid-template-rows: none;
        gap: 7px;
      }
      .coin-counter {
        font-size: 15px;
        min-height: 34px;
        padding: 6px 8px;
      }
      #exit-menu-btn { font-size: 13px; padding: 8px 8px; }
    }

    #battle-screen.virtual-landscape #battle-hud {
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    #battle-screen.virtual-landscape .deck {
      grid-template-columns: repeat(5, minmax(42px, 1fr));
      gap: 7px;
      padding: 7px;
    }

    #battle-screen.virtual-landscape .deck-card {
      aspect-ratio: 3 / 4;
    }

    #battle-screen.virtual-landscape .hud-side {
      min-width: 132px;
      grid-template-columns: none;
      grid-template-rows: auto auto 1fr;
      gap: 7px;
    }

    #battle-screen.virtual-landscape .coin-counter {
      min-height: 34px;
      font-size: 15px;
      padding: 6px 8px;
    }

    #battle-screen.virtual-landscape #start-btn,
    #battle-screen.virtual-landscape #exit-menu-btn {
      font-size: 13px;
      padding: 8px 8px;
    }
  </style>
</head>
<body>
  <div id="main-menu">
    <div class="menu-panel">
      <h1>🐹 HAMSTER DEFENSE</h1>
      <p>Защити замок хомяков</p>
      <button onclick="enterBattle()">🛡️ В БОЙ!</button>
    </div>
  </div>

  <div id="battle-screen">
    <div id="battle-viewport">
      <div id="battle-field">
      <div class="sand-patch patch-a"></div>
      <div class="sand-patch patch-b"></div>
      <div class="sand-patch patch-c"></div>

      <svg id="roads" viewBox="0 0 960 540" preserveAspectRatio="none" aria-hidden="true">
        <path class="road-base" d="M -35 90 L 160 90 L 160 365 L 345 365 L 345 270 L 480 270" />
        <path class="road-base" d="M 995 96 L 800 96 L 800 340 L 635 340 L 635 270 L 480 270" />
        <path class="road-mid" d="M -35 90 L 160 90 L 160 365 L 345 365 L 345 270 L 480 270" />
        <path class="road-mid" d="M 995 96 L 800 96 L 800 340 L 635 340 L 635 270 L 480 270" />
        <path class="road-edge" d="M -35 90 L 160 90 L 160 365 L 345 365 L 345 270 L 480 270" />
        <path class="road-edge" d="M 995 96 L 800 96 L 800 340 L 635 340 L 635 270 L 480 270" />
      </svg>

      <div class="base-container">
        <div class="hp-bar-bg"><div id="hp-fill"></div></div>
        <img src="castle-removebg-preview.png" class="base-img" alt="">
      </div>

      <div id="selection-menu">
        <div class="select-card" onclick="placeHamster('warrior')"><img src="warior.png" alt="">Воин</div>
        <div class="select-card" onclick="placeHamster('archer')"><img src="arrow.png" alt="">Стрелок</div>
      </div>

      <div id="win-screen">
        <h2>Волна отбита!</h2>
        <button onclick="nextWave()">Следующая волна</button>
      </div>
    </div>

    </div>

    <div id="battle-hud">
      <div class="deck" aria-label="Колода">
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
      </div>
      <div class="hud-side">
        <div class="coin-counter">🪙 <span id="coin-count">200</span></div>
        <button id="exit-menu-btn" onclick="exitToMenu()">В меню</button>
        <button id="start-btn" onclick="startWave()">▶️ Начать волну</button>
      </div>
    </div>
  </div>

  <script>
    const ASSETS = {
      warrior: { stand: 'warior.png', anim1: 'anim_war-removebg-preview.png', anim2: 'anim_war2-removebg-preview.png' },
      archer: { stand: 'arrow.png', anim1: 'anim_arow1-removebg-preview.png', anim2: 'anim_arow2-removebg-preview.png' }
    };

    const ENEMIES = [
      { icon: '🐛', hp: 4, speed: 58, dmg: 8 },
      { icon: '🐝', hp: 6, speed: 68, dmg: 10 },
      { icon: '🕷️', hp: 9, speed: 50, dmg: 14 }
    ];

    const PATHS = [
      [{x:-35,y:90}, {x:160,y:90}, {x:160,y:365}, {x:345,y:365}, {x:345,y:270}, {x:480,y:270}],
      [{x:995,y:96}, {x:800,y:96}, {x:800,y:340}, {x:635,y:340}, {x:635,y:270}, {x:480,y:270}]
    ];

    const GAME = { width: 960, height: 540 };
    const GRID = { cols: 16, rows: 9, cellW: 60, cellH: 60 };
    const ROAD_RADIUS = 54;
    const CASTLE_RADIUS = 95;
    const EXTRA_BLOCKED_CELLS = new Set(['9,5', '10,5']);
    let SLOT_COUNT = 0;
    let wave = 1;
    let gold = 200;
    let hp = 100;
    let killed = 0;
    let finishedEnemies = 0;
    let targetKills = 16;
    let roundRewardPaid = false;
    let enemies = [];
    let placed = [];
    let lastAtk = [];
    let currentSlot = null;
    let running = false;
    let spawnTimer = null;
    let lastFrame = performance.now();

    function shouldUsePortraitLandscape() {
      return window.innerHeight > window.innerWidth && window.innerWidth <= 820;
    }

    function updateMenuOrientation() {
      document.getElementById('main-menu').classList.remove('portrait-landscape');
    }

    async function enterBattle() {
      await requestGameFullscreen();
      document.getElementById('main-menu').style.display = 'none';
      document.getElementById('main-menu').classList.remove('portrait-landscape');
      document.getElementById('battle-screen').style.display = 'flex';
      document.body.classList.add('battle-active');
      updateGameScale();
      buildGrid();
      resetBattle();
      updateGold();
      setTimeout(updateGameScale, 350);
    }

    async function requestGameFullscreen() {
      const root = document.documentElement;
      try {
        if (root.requestFullscreen && !document.fullscreenElement) {
          await root.requestFullscreen({ navigationUI: 'hide' });
        }
      } catch (error) {
        try {
          if (root.requestFullscreen && !document.fullscreenElement) {
            await root.requestFullscreen();
          }
        } catch (fallbackError) {}
      }
      await lockLandscape();
    }

    async function lockLandscape() {
      if (!screen.orientation || !screen.orientation.lock) return;
      try {
        await screen.orientation.lock('landscape-primary');
      } catch (error) {
        try {
          await screen.orientation.lock('landscape');
        } catch (fallbackError) {}
      }
    }

    function updateGameScale() {
      const screen = document.getElementById('battle-screen');
      const hud = document.getElementById('battle-hud');
      const useVirtualLandscape = shouldUsePortraitLandscape();
      const viewportWidth = useVirtualLandscape ? window.innerHeight : window.innerWidth;
      const viewportHeight = useVirtualLandscape ? window.innerWidth : window.innerHeight;
      const verticalPadding = useVirtualLandscape ? 16 : 34;
      const hudHeight = hud ? hud.offsetHeight + 12 : 106;
      const availableWidth = viewportWidth - (useVirtualLandscape ? 16 : 24);
      const availableHeight = viewportHeight - verticalPadding - hudHeight;
      const scale = Math.min(1, availableWidth / GAME.width, availableHeight / GAME.height);

      screen.classList.toggle('virtual-landscape', useVirtualLandscape);
      screen.classList.remove('portrait-landscape');
      screen.style.setProperty('--game-scale', scale);
      screen.style.setProperty('--game-width', GAME.width * scale + 'px');
      screen.style.setProperty('--game-height', GAME.height * scale + 'px');
    }

    function buildGrid() {
      const field = document.getElementById('battle-field');
      field.querySelectorAll('.slot').forEach(slot => slot.remove());
      placed = [];
      lastAtk = [];

      for (let row = 0; row < GRID.rows; row++) {
        for (let col = 0; col < GRID.cols; col++) {
          const center = {
            x: col * GRID.cellW + GRID.cellW / 2,
            y: row * GRID.cellH + GRID.cellH / 2
          };
          const slotIndex = placed.length;
          const slot = document.createElement('div');
          slot.className = 'slot';
          slot.id = 'slot-' + slotIndex;
          slot.style.left = col * GRID.cellW + 'px';
          slot.style.top = row * GRID.cellH + 'px';

          if (isBlockedCell(center, col, row)) {
            slot.classList.add('road-cell');
          } else {
            slot.onclick = () => openSelect(slotIndex);
          }

          field.appendChild(slot);
          placed.push(null);
          lastAtk.push(0);
        }
      }

      SLOT_COUNT = placed.length;
    }

    function isBlockedCell(center, col, row) {
      if (EXTRA_BLOCKED_CELLS.has(`${col},${row}`)) return true;
      if (Math.hypot(center.x - 480, center.y - 270) < CASTLE_RADIUS) return true;
      return PATHS.some(path => pointNearPath(center, path, ROAD_RADIUS));
    }

    function pointNearPath(point, path, radius) {
      for (let i = 0; i < path.length - 1; i++) {
        if (distanceToSegment(point, path[i], path[i + 1]) < radius) return true;
      }
      return false;
    }

    function distanceToSegment(point, a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const lengthSq = dx * dx + dy * dy;
      const t = Math.max(0, Math.min(1, ((point.x - a.x) * dx + (point.y - a.y) * dy) / lengthSq));
      const x = a.x + t * dx;
      const y = a.y + t * dy;
      return Math.hypot(point.x - x, point.y - y);
    }

    function resetBattle() {
      enemies.forEach(enemy => enemy.el.remove());
      enemies = [];
      killed = 0;
      finishedEnemies = 0;
      roundRewardPaid = false;
      hp = 100;
      running = false;
      targetKills = 14 + wave * 2;
      document.getElementById('win-screen').style.display = 'none';
      document.getElementById('start-btn').disabled = false;
      updateHp();
    }

    function openSelect(slotIndex) {
      if (running || placed[slotIndex]) return;
      const slot = document.getElementById('slot-' + slotIndex);
      if (slot.classList.contains('road-cell')) return;
      currentSlot = slotIndex;
      const menu = document.getElementById('selection-menu');
      const field = document.getElementById('battle-field');
      const x = Math.max(96, Math.min(field.clientWidth - 96, slot.offsetLeft + slot.offsetWidth / 2));
      const y = Math.max(78, Math.min(field.clientHeight - 78, slot.offsetTop - 76));
      menu.style.left = x + 'px';
      menu.style.top = y + 'px';
      menu.style.display = 'flex';
    }

    function placeHamster(type) {
      if (currentSlot === null) return;
      placed[currentSlot] = type;
      document.getElementById('slot-' + currentSlot).classList.add('placed');
      setHamsterImage(currentSlot, 'stand');
      document.getElementById('selection-menu').style.display = 'none';
      currentSlot = null;
    }

    function setHamsterImage(slotIndex, state) {
      const type = placed[slotIndex];
      if (!type) return;
      document.getElementById('slot-' + slotIndex).innerHTML = `<img src="${ASSETS[type][state]}" alt="">`;
    }

    function startWave() {
      if (!placed.some(Boolean)) {
        alert('Поставь хотя бы одного хомяка!');
        return;
      }

      running = true;
      killed = 0;
      finishedEnemies = 0;
      roundRewardPaid = false;
      document.getElementById('start-btn').disabled = true;
      let spawned = 0;
      spawnTimer = setInterval(() => {
        if (spawned >= targetKills) {
          clearInterval(spawnTimer);
          spawnTimer = null;
          return;
        }
        spawnEnemy(spawned % 2);
        spawned++;
      }, 850);
    }

    function spawnEnemy(pathIndex) {
      const base = ENEMIES[Math.min(ENEMIES.length - 1, Math.floor(Math.random() * (1 + Math.min(2, wave))))];
      const path = PATHS[pathIndex];
      const el = document.createElement('div');
      el.className = 'enemy';
      el.innerHTML = `<span class="enemy-hp">${base.hp + wave}</span><span>${base.icon}</span>`;
      document.getElementById('battle-field').appendChild(el);

      const enemy = {
        el,
        path,
        segment: 0,
        x: path[0].x,
        y: path[0].y,
        hp: base.hp + wave,
        maxHp: base.hp + wave,
        speed: base.speed + wave * 2,
        dmg: base.dmg,
        dead: false
      };
      enemies.push(enemy);
      positionEnemy(enemy);
    }

    function gameLoop(now) {
      const dt = Math.min(0.04, (now - lastFrame) / 1000);
      lastFrame = now;

      if (running) {
        moveEnemies(dt);
        attackEnemies(now);
        if (finishedEnemies >= targetKills && enemies.length === 0 && !spawnTimer) endWave();
      }

      requestAnimationFrame(gameLoop);
    }

    function moveEnemies(dt) {
      [...enemies].forEach(enemy => {
        if (enemy.dead) return;
        let remaining = enemy.speed * dt;

        while (remaining > 0 && enemy.segment < enemy.path.length - 1) {
          const next = enemy.path[enemy.segment + 1];
          const dx = next.x - enemy.x;
          const dy = next.y - enemy.y;
          const dist = Math.hypot(dx, dy);

          if (dist <= remaining) {
            enemy.x = next.x;
            enemy.y = next.y;
            enemy.segment++;
            remaining -= dist;
          } else {
            enemy.x += dx / dist * remaining;
            enemy.y += dy / dist * remaining;
            remaining = 0;
          }
        }

        if (enemy.segment >= enemy.path.length - 1) {
          damageCastle(enemy);
        } else {
          positionEnemy(enemy);
        }
      });
    }

    function attackEnemies(now) {
      placed.forEach((type, slotIndex) => {
        if (!type) return;
        const slotCenter = getSlotCenter(slotIndex);
        const range = type === 'warrior' ? 110 : 235;
        const delay = type === 'warrior' ? 760 : 1150;
        const damage = type === 'warrior' ? 2.4 : 1.8;
        const target = enemies
          .filter(enemy => Math.hypot(enemy.x - slotCenter.x, enemy.y - slotCenter.y) <= range)
          .sort((a, b) => b.segment - a.segment || distanceToCastle(a) - distanceToCastle(b))[0];

        if (!target || now - lastAtk[slotIndex] < delay) return;
        lastAtk[slotIndex] = now;
        animateHamster(slotIndex, type, () => {
          if (type === 'warrior') {
            showSlash(target.x, target.y);
            hitEnemy(target, damage);
          } else {
            shootArrow(slotCenter, target, damage);
          }
        });
      });
    }

    function animateHamster(slotIndex, type, onHit) {
      setHamsterImage(slotIndex, 'anim1');
      setTimeout(() => {
        if (placed[slotIndex] !== type) return;
        setHamsterImage(slotIndex, 'anim2');
        onHit();
      }, 160);
      setTimeout(() => {
        if (placed[slotIndex] === type) setHamsterImage(slotIndex, 'stand');
      }, 420);
    }

    function shootArrow(from, target, damage) {
      const arrow = document.createElement('div');
      arrow.className = 'projectile-arrow';
      arrow.style.left = from.x + 'px';
      arrow.style.top = from.y + 'px';
      document.getElementById('battle-field').appendChild(arrow);

      const fly = setInterval(() => {
        if (!target.el.parentNode || target.dead) {
          arrow.remove();
          clearInterval(fly);
          return;
        }
        const ax = parseFloat(arrow.style.left);
        const ay = parseFloat(arrow.style.top);
        const dx = target.x - ax;
        const dy = target.y - ay;
        const dist = Math.hypot(dx, dy);

        if (dist < 18) {
          showHit(target.x, target.y);
          hitEnemy(target, damage);
          arrow.remove();
          clearInterval(fly);
        } else {
          arrow.style.left = ax + dx / dist * 16 + 'px';
          arrow.style.top = ay + dy / dist * 16 + 'px';
          arrow.style.rotate = Math.atan2(dy, dx) + 'rad';
        }
      }, 24);
    }

    function hitEnemy(enemy, amount) {
      if (enemy.dead) return;
      enemy.hp -= amount;
      if (enemy.hp <= 0) {
        enemy.dead = true;
        enemy.el.remove();
        enemies = enemies.filter(item => item !== enemy);
        killed++;
        finishedEnemies++;
        gold += 5;
        updateGold();
      } else {
        enemy.el.querySelector('.enemy-hp').textContent = Math.ceil(enemy.hp);
      }
    }

    function damageCastle(enemy) {
      hp -= enemy.dmg;
      updateHp();
      enemy.dead = true;
      enemy.el.remove();
      enemies = enemies.filter(item => item !== enemy);
      finishedEnemies++;
      if (hp <= 0) {
        alert('Замок пал!');
        location.reload();
      }
    }

    function endWave() {
      if (roundRewardPaid) return;
      running = false;
      roundRewardPaid = true;
      gold += hp >= 100 ? 200 : 100;
      updateGold();
      document.getElementById('win-screen').style.display = 'block';
    }

    function nextWave() {
      wave++;
      resetBattle();
    }

    function exitToMenu() {
      if (spawnTimer) {
        clearInterval(spawnTimer);
        spawnTimer = null;
      }
      enemies.forEach(enemy => enemy.el.remove());
      enemies = [];
      running = false;
      currentSlot = null;
      document.getElementById('selection-menu').style.display = 'none';
      document.getElementById('win-screen').style.display = 'none';
      document.getElementById('battle-screen').style.display = 'none';
      document.getElementById('battle-screen').classList.remove('portrait-landscape');
      document.getElementById('battle-screen').classList.remove('virtual-landscape');
      document.getElementById('main-menu').style.display = 'flex';
      document.body.classList.remove('battle-active');
      updateMenuOrientation();
      if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
    }

    function updateHp() {
      document.getElementById('hp-fill').style.width = Math.max(0, hp) + '%';
    }

    function updateGold() {
      document.getElementById('coin-count').textContent = gold;
    }

    function positionEnemy(enemy) {
      enemy.el.style.left = enemy.x + 'px';
      enemy.el.style.top = enemy.y + 'px';
    }

    function getSlotCenter(slotIndex) {
      const slot = document.getElementById('slot-' + slotIndex);
      return {
        x: slot.offsetLeft + slot.offsetWidth / 2,
        y: slot.offsetTop + slot.offsetHeight / 2
      };
    }

    function distanceToCastle(enemy) {
      return Math.hypot(enemy.x - 480, enemy.y - 270);
    }

    function showSlash(x, y) {
      const effect = document.createElement('div');
      effect.className = 'attack-effect';
      effect.style.left = x + 'px';
      effect.style.top = y + 'px';
      document.getElementById('battle-field').appendChild(effect);
      setTimeout(() => effect.remove(), 360);
    }

    function showHit(x, y) {
      const effect = document.createElement('div');
      effect.className = 'hit-flash';
      effect.style.left = x + 'px';
      effect.style.top = y + 'px';
      document.getElementById('battle-field').appendChild(effect);
      setTimeout(() => effect.remove(), 300);
    }

    document.getElementById('battle-field').addEventListener('click', event => {
      if (!event.target.classList.contains('slot')) {
        document.getElementById('selection-menu').style.display = 'none';
      }
    });

    window.addEventListener('resize', () => {
      updateMenuOrientation();
      updateGameScale();
    });
    window.addEventListener('orientationchange', () => {
      setTimeout(() => {
        updateMenuOrientation();
        updateGameScale();
      }, 350);
    });
    updateMenuOrientation();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
