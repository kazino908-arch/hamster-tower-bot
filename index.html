<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Хомяки: Башня Обороны</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1e3d;
      color: white;
      margin: 0;
      padding: 10px;
      text-align: center;
    }
    #battle-field {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 580px;
      background: linear-gradient(#1e4d2b, #2e7a3f);
      border: 6px solid #444;
      margin: 15px auto;
      overflow: hidden;
      border-radius: 15px;
    }
    .road {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 100%;
      background: linear-gradient(#f1c40f, #e67e22);
      border-left: 12px solid #d4a017;
      border-right: 12px solid #d4a017;
    }
    .slot {
      position: absolute;
      bottom: 30px;
      width: 38px;        /* в 2 раза меньше */
      height: 38px;
      background: rgba(60,60,60,0.95);
      border: 3px solid #ccc;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .slot1 { left: 95px; }
    .slot2 { right: 95px; }

    .enemy {
      position: absolute;
      font-size: 38px;
      left: 50%;
      transform: translateX(-50%);
      transition: top 8s linear;   /* медленнее */
    }
    .enemy-hp {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: lime;
      font-size: 13px;
      padding: 1px 6px;
      border-radius: 6px;
    }
    .message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      color: gold;
      text-shadow: 0 0 10px black;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐹 Хомяки: Башня Обороны</h1>

    <div id="main-menu">
      <p>Золото: <span id="gold">200</span> 🪙 | Эпизод: <span id="episode">1</span></p>
      <p>🏰 Башня: <span id="tower-hp">100</span> ❤️</p>
      <button onclick="enterBattle()" style="background:#e74c3c;color:white;padding:15px 30px;font-size:20px;">🛡️ Защитить башню</button>
    </div>

    <div id="battle-screen" style="display:none;">
      <p>Волна: <span id="wave">1</span> | Осталось: <span id="enemies-left">10</span></p>

      <div id="battle-field">
        <div class="road"></div>
        <div style="position:absolute; bottom:105px; left:50%; transform:translateX(-50%); font-size:70px;">🏰</div>

        <div class="slot slot1" onclick="placeHamster(0)"></div>
        <div class="slot slot2" onclick="placeHamster(1)"></div>

        <div id="win-message" class="message">🎉 Первый этап закончен!</div>
      </div>

      <button onclick="startWave()" style="background:#27ae60;color:white;font-size:22px;padding:12px 40px;">▶️ Начать волну</button>
      <button onclick="exitBattle()">🔙 Выйти</button>
    </div>
  </div>

  <script>
    let gold = 200, episode = 1, towerHP = 100;
    let hamsters = { warrior: 2, archer: 1 };
    let placed = [null, null];
    let enemies = [];
    let totalKilled = 0;
    let currentGroup = 0;
    let groups = [2, 3, 5];

    function updateUI() {
      document.getElementById("gold").textContent = gold;
      document.getElementById("tower-hp").textContent = towerHP;
    }

    function enterBattle() {
      document.getElementById("main-menu").style.display = "none";
      document.getElementById("battle-screen").style.display = "block";
      resetWave();
      updateUI();
    }

    function resetWave() {
      enemies = [];
      totalKilled = 0;
      currentGroup = 0;
      document.getElementById("enemies-left").textContent = 10;
      document.getElementById("win-message").style.display = "none";
      document.querySelectorAll('.slot').forEach(s => s.innerHTML = '');
      placed = [null, null];
    }

    function exitBattle() {
      document.getElementById("battle-screen").style.display = "none";
      document.getElementById("main-menu").style.display = "block";
    }

    function placeHamster(index) {
      let avail = Object.keys(hamsters).filter(t => hamsters[t] > 0);
      if (!avail.length) return alert("Нет хомяков в инвентаре!");

      let type = prompt("Кого поставить?\n- warrior (⚔️ Мечник)\n- archer (🏹 Лучник)", avail[0]);
      if (type && hamsters[type] > 0) {
        hamsters[type]--;
        placed[index] = type;
        document.querySelectorAll('.slot')[index].innerHTML = type === "warrior" ? "⚔️" : "🏹";
      }
    }

    function startWave() {
      resetWave();
      spawnNextGroup();
    }

    function spawnNextGroup() {
      if (currentGroup >= groups.length) return;

      let count = groups[currentGroup];
      for (let i = 0; i < count; i++) {
        setTimeout(() => spawnEnemy(), i * 600);
      }
    }

    function spawnEnemy() {
      let field = document.getElementById("battle-field");
      let enemy = document.createElement("div");
      enemy.className = "enemy";
      enemy.innerHTML = `🐛<div class="enemy-hp">3</div>`;
      enemy.style.top = "-40px";
      enemy.dataset.hp = 3;
      field.appendChild(enemy);
      enemies.push(enemy);

      setTimeout(() => {
        enemy.style.top = "410px";   // останавливаются перед башней
      }, 100);
    }

    // Автоматические атаки хомяков
    setInterval(() => {
      if (document.getElementById("battle-screen").style.display === "none") return;

      placed.forEach((type, i) => {
        if (!type || enemies.length === 0) return;

        if (type === "warrior") {
          enemies.forEach(enemy => {
            let hp = parseFloat(enemy.dataset.hp) - 0.8;
            enemy.dataset.hp = hp;
            enemy.querySelector('.enemy-hp').textContent = hp.toFixed(1);
            if (hp <= 0) killEnemy(enemy);
          });
        }

        if (type === "archer") {
          let target = enemies[0]; // бьёт самого верхнего (дальнего)
          if (target) {
            let hp = parseFloat(target.dataset.hp) - 0.6;
            target.dataset.hp = hp;
            target.querySelector('.enemy-hp').textContent = hp.toFixed(1);
            if (hp <= 0) killEnemy(target);
          }
        }
      });
    }, 800);

    function killEnemy(enemy) {
      if (!enemy.parentNode) return;
      enemy.parentNode.removeChild(enemy);
      enemies = enemies.filter(e => e !== enemy);
      totalKilled++;
      document.getElementById("enemies-left").textContent = 10 - totalKilled;

      // Проверка на завершение группы
      if (enemies.length === 0 && totalKilled < 10) {
        currentGroup++;
        setTimeout(spawnNextGroup, 800);
      }

      // Победа в этапе
      if (totalKilled >= 10) {
        document.getElementById("win-message").style.display = "block";
        setTimeout(() => {
          alert("🎉 Первый этап закончен!\nНаграда: +150 золота");
          gold += 150;
          episode++;
          updateUI();
          exitBattle();
        }, 1500);
      }
    }

    updateUI();
  </script>
</body>
</html>
