<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Хомяки: Поэтапная Оборона</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b1e3d; color: white; margin: 0; padding: 10px; text-align: center; }
    #battle-field {
      position: relative; width: 100%; max-width: 420px; height: 580px;
      background: linear-gradient(#1e4d2b, #2e7a3f); border: 6px solid #444;
      margin: 15px auto; overflow: hidden; border-radius: 15px; cursor: crosshair;
    }
    .road {
      position: absolute; left: 50%; transform: translateX(-50%);
      width: 110px; height: 100%;
      background: linear-gradient(#f1c40f, #e67e22);
      border-left: 12px solid #d4a017; border-right: 12px solid #d4a017;
    }
    /* СЛОТЫ И ЗАМОК */
    .slot { position: absolute; bottom: 20px; width: 56px; height: 56px;
      background: rgba(50,50,50,0.95); border: 4px solid #ddd; border-radius: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 32px; z-index: 10; transition: 0.2s;
    }
    .slot:hover { border-color: #fff; background: #444; }
    .slot1 { left: 78px; } .slot2 { right: 78px; }

    .base { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 80px; z-index: 3; }

    .charge-bar-container {
      position: absolute; bottom: 82px; width: 60px; height: 8px;
      background: #222; border: 1px solid #666; border-radius: 4px; overflow: hidden; display: none;
    }
    .charge-bar { height: 100%; background: linear-gradient(#ffd700, #ffaa00); width: 0%; }

    /* ПАНЕЛЬ ВЫБОРА ХОМЯКА */
    #selection-menu {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); padding: 10px; border-radius: 15px;
      display: none; gap: 10px; z-index: 200; border: 2px solid #fff;
    }
    .select-card {
      background: #444; padding: 10px; border-radius: 8px; cursor: pointer; border: 2px solid transparent;
    }
    .select-card:hover { border-color: #00ff00; background: #555; }

    /* СПОСОБНОСТИ */
    .ability-buttons {
      position: absolute; left: 10px; top: 180px;
      display: flex; flex-direction: column; gap: 15px; z-index: 100;
    }
    .ability-btn {
      width: 70px; height: 70px; background: #333; border: 3px solid #666;
      border-radius: 12px; display: none; flex-direction: column;
      align-items: center; justify-content: center; font-size: 11px; cursor: pointer;
    }
    .ability-btn b { font-size: 24px; }
    .ability-btn.ready { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
    .ability-btn.targeting { border-color: #00ffff; box-shadow: 0 0 25px #00ffff; transform: scale(1.1); background: #444; }

    /* ВРАГИ И ЭФФЕКТЫ */
    .enemy { position: absolute; font-size: 42px; transition: top 10s linear; z-index: 5; }
    .enemy-hp {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      background: #000000cc; color: #00ff00; font-size: 13px; padding: 1px 8px;
      border-radius: 8px; font-weight: bold;
    }
    .whirlwind {
      position: absolute; width: 60px; height: 60px;
      background: rgba(0,255,255,0.4); border: 4px solid cyan; border-radius: 50%;
      animation: spin 0.5s linear infinite; z-index: 20;
    }
    .arrow-horde {
      position: absolute; width: 100px; height: 150px;
      background: rgba(255,60,60,0.3); border: 3px dashed red; z-index: 20;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    #ability-hint {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,255,255,0.9); color: #000; padding: 10px 20px;
      border-radius: 10px; display: none; z-index: 101; font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🐹 Хомяки: Оборона</h1>

  <div id="main-menu">
    <p>Золото: <span id="gold">200</span> 🪙 | Эпизод: <span id="episode">1</span></p>
    <p>🏰 Башня: <span id="tower-hp">100</span> ❤️</p>
    <button onclick="enterBattle()" style="background:#e74c3c;color:white;padding:15px 30px;font-size:20px;border-radius:10px; cursor:pointer;">🛡️ В бой!</button>
  </div>

  <div id="battle-screen" style="display:none;">
    <p>Группа: <span id="group-info">1 / 3</span> | Убито: <span id="total-killed">0</span> / 10</p>

    <div id="battle-field">
      <div id="ability-hint">ВЫБЕРИТЕ МЕСТО НА КАРТЕ!</div>
      <div class="road"></div>
      <div class="base">🏰</div>

      <div id="selection-menu">
        <div class="select-card" onclick="placeHamster('warrior')"><b>⚔️</b><br>Воин</div>
        <div class="select-card" onclick="placeHamster('archer')"><b>🏹</b><br>Лучник</div>
      </div>

      <div class="slot slot1" onclick="openSelection(0)"></div>
      <div class="slot slot2" onclick="openSelection(1)"></div>

      <div class="charge-bar-container" id="cont-0" style="left:76px"><div class="charge-bar" id="charge0"></div></div>
      <div class="charge-bar-container" id="cont-1" style="right:76px"><div class="charge-bar" id="charge1"></div></div>

      <div class="ability-buttons">
        <div class="ability-btn" id="btn-warrior" onclick="prepareAbility('warrior', event)"><b>⚡</b>Вихрь</div>
        <div class="ability-btn" id="btn-archer" onclick="prepareAbility('archer', event)"><b>🏹</b>Орда</div>
      </div>
    </div>

    <button id="start-btn" onclick="startWave()" style="background:#27ae60;color:white;font-size:20px;padding:12px 40px;border-radius:10px; cursor:pointer;">▶️ Начать волну</button>
    <button onclick="exitBattle()" style="margin-left:10px; cursor:pointer;">🔙 Меню</button>
  </div>

  <script>
    let gold = 200, episode = 1, towerHP = 100;
    let hamsters = { warrior: 5, archer: 5 };
    let placed = [null, null];
    let enemies = [];
    let isBattleActive = false;
    let currentSlotIdx = null;

    const groups = [2, 3, 5];
    let currentGroupIndex = 0;
    let killedInCurrentGroup = 0;
    let totalKilled = 0;

    let slotCharges = [0, 0];
    let selectedAbilityType = null;

    function enterBattle() {
      document.getElementById("main-menu").style.display = "none";
      document.getElementById("battle-screen").style.display = "block";
      resetBattleState();
    }

    function resetBattleState() {
      enemies.forEach(e => e.remove());
      enemies = [];
      totalKilled = 0; currentGroupIndex = 0; killedInCurrentGroup = 0;
      isBattleActive = false;
      slotCharges = [0, 0];
      placed = [null, null];
      document.querySelectorAll('.slot').forEach(s => s.innerHTML = "");
      document.querySelectorAll('.charge-bar-container').forEach(c => c.style.display = "none");
      document.getElementById("start-btn").disabled = false;
      updateAbilityButtons();
      updateLabels();
    }

    // НОВОЕ МЕНЮ ВЫБОРА
    function openSelection(index) {
      if (isBattleActive) return;
      if (placed[index]) return;
      currentSlotIdx = index;
      document.getElementById("selection-menu").style.display = "flex";
    }

    function placeHamster(type) {
      if (hamsters[type] > 0) {
        placed[currentSlotIdx] = type;
        document.querySelectorAll('.slot')[currentSlotIdx].innerHTML = type === "warrior" ? "⚔️" : "🏹";
        document.getElementById("cont-" + currentSlotIdx).style.display = "block";
        document.getElementById("selection-menu").style.display = "none";
        updateAbilityButtons();
      }
    }

    // ПОКАЗ КНОПОК ТОЛЬКО ДЛЯ ТЕХ КТО СТОИТ
    function updateAbilityButtons() {
      document.getElementById("btn-warrior").style.display = placed.includes("warrior") ? "flex" : "none";
      document.getElementById("btn-archer").style.display = placed.includes("archer") ? "flex" : "none";
    }

    function prepareAbility(type, event) {
      event.stopPropagation();
      let slotIdx = placed.indexOf(type);
      if (slotCharges[slotIdx] < 100) return alert("Заряжается!");

      selectedAbilityType = type;
      document.getElementById("ability-hint").style.display = "block";
      document.querySelectorAll('.ability-btn').forEach(b => b.classList.remove('targeting'));
      document.getElementById('btn-' + type).classList.add('targeting');
    }

    document.getElementById("battle-field").addEventListener("click", (e) => {
      if (!selectedAbilityType) return;
      if (e.target.closest('.slot') || e.target.closest('.ability-btn')) return;

      const rect = e.currentTarget.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      if (selectedAbilityType === "warrior") createWhirlwind(x, y);
      else if (selectedAbilityType === "archer") createArrowHorde(x, y);

      let slotIdx = placed.indexOf(selectedAbilityType);
      slotCharges[slotIdx] = 0;
      cancelAbility();
    });

    function cancelAbility() {
      selectedAbilityType = null;
      document.getElementById("ability-hint").style.display = "none";
      document.querySelectorAll('.ability-btn').forEach(b => b.classList.remove('targeting'));
    }

    function startWave() {
      if (placed.filter(p => p).length === 0) return alert("Поставьте хомяков!");
      isBattleActive = true;
      document.getElementById("start-btn").disabled = true;
      spawnNextGroup();
    }

    function spawnNextGroup() {
      if (currentGroupIndex >= groups.length) return;
      killedInCurrentGroup = 0;
      let count = groups[currentGroupIndex];
      updateLabels();
      for (let i = 0; i < count; i++) setTimeout(() => spawnSingleEnemy(i), i * 1200);
    }

    function spawnSingleEnemy(offset) {
      const field = document.getElementById("battle-field");
      const enemy = document.createElement("div");
      enemy.className = "enemy";
      enemy.innerHTML = `🐛<div class="enemy-hp">3</div>`;
      enemy.dataset.hp = "3";
      const center = field.offsetWidth / 2;
      enemy.style.left = (center + (offset % 3 - 1) * 35) + "px";
      enemy.style.top = "-60px";
      field.appendChild(enemy);
      enemies.push(enemy);
      setTimeout(() => enemy.style.top = "520px", 100);
    }

    setInterval(() => {
      if (!isBattleActive) return;
      const fieldRect = document.getElementById("battle-field").getBoundingClientRect();

      placed.forEach((type, idx) => {
        if (type) {
          slotCharges[idx] = Math.min(100, slotCharges[idx] + 0.8);
          updateChargeBars();
          document.getElementById("btn-" + type).classList.toggle("ready", slotCharges[idx] >= 100);
        }
      });

      enemies.forEach(enemy => {
        const rect = enemy.getBoundingClientRect();
        const currentTop = rect.top - fieldRect.top;

        if (placed.includes("archer") && currentTop > 150 && currentTop < 300) takeDamage(enemy, 0.07);
        if (placed.includes("warrior") && currentTop > 380 && currentTop < 460) takeDamage(enemy, 0.22);

        if (currentTop > 480) {
          towerHP -= 0.3;
          document.getElementById("tower-hp").textContent = Math.max(0, Math.floor(towerHP));
          if (towerHP <= 0) { alert("Башня пала!"); location.reload(); }
        }
      });
    }, 100);

    function updateChargeBars() {
      if (placed[0]) document.getElementById("charge0").style.width = slotCharges[0] + "%";
      if (placed[1]) document.getElementById("charge1").style.width = slotCharges[1] + "%";
    }

    function takeDamage(enemy, dmg) {
      let hp = parseFloat(enemy.dataset.hp) - dmg;
      enemy.dataset.hp = hp;
      enemy.querySelector('.enemy-hp').textContent = Math.max(0, Math.ceil(hp));
      if (hp <= 0) killEnemy(enemy);
    }

    function killEnemy(enemy) {
      if (!enemy.parentNode) return;
      enemy.remove();
      enemies = enemies.filter(e => e !== enemy);
      killedInCurrentGroup++; totalKilled++;
      updateLabels();
      if (killedInCurrentGroup >= groups[currentGroupIndex]) {
        currentGroupIndex++;
        if (currentGroupIndex < groups.length) setTimeout(spawnNextGroup, 2000);
        else { isBattleActive = false; alert("Победа!"); gold += 150; exitBattle(); }
      }
    }

    function updateLabels() {
      document.getElementById("group-info").textContent = (currentGroupIndex + 1) + " / 3";
      document.getElementById("total-killed").textContent = totalKilled;
      document.getElementById("gold").textContent = gold;
    }

    function exitBattle() {
      document.getElementById("battle-screen").style.display = "none";
      document.getElementById("main-menu").style.display = "block";
      isBattleActive = false;
      cancelAbility();
    }

    function createWhirlwind(x, y) {
      const field = document.getElementById("battle-field");
      const w = document.createElement("div");
      w.className = "whirlwind";
      w.style.left = (x - 30) + "px"; w.style.top = (y - 30) + "px";
      field.appendChild(w);
      setTimeout(() => {
        enemies.forEach(en => {
          const ex = parseFloat(en.style.left) + 20;
          const ey = en.getBoundingClientRect().top - field.getBoundingClientRect().top + 20;
          if (Math.hypot(ex - x, ey - y) < 80) takeDamage(en, 5);
        });
        w.remove();
      }, 700);
    }

    function createArrowHorde(x, y) {
      const field = document.getElementById("battle-field");
      const h = document.createElement("div");
      h.className = "arrow-horde";
      h.style.left = (x - 50) + "px"; h.style.top = (y - 75) + "px";
      field.appendChild(h);
      let ticks = 0;
      let int = setInterval(() => {
        enemies.forEach(en => {
          const ex = parseFloat(en.style.left) + 20;
          const ey = en.getBoundingClientRect().top - field.getBoundingClientRect().top + 20;
          if (Math.abs(ex - x) < 60 && Math.abs(ey - y) < 85) takeDamage(en, 1);
        });
        if (++ticks > 8) { clearInterval(int); h.remove(); }
      }, 300);
    }
  </script>
</body>
</html>
