<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Хомяки: Башня Обороны</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1e3d;
      color: white;
      margin: 0;
      padding: 10px;
      text-align: center;
    }
    #battle-field {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 560px;
      background: linear-gradient(#1e4d2b, #2e7a3f);
      border: 6px solid #444;
      margin: 15px auto;
      overflow: hidden;
      border-radius: 15px;
    }
    .road {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 100%;
      background: linear-gradient(#f1c40f, #e67e22);
      border-left: 10px solid #d4a017;
      border-right: 10px solid #d4a017;
    }
    .slot {
      position: absolute;
      bottom: 25px;
      width: 70px;
      height: 70px;
      background: rgba(60,60,60,0.95);
      border: 4px solid #ccc;
      border-radius: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    .slot1 { left: 70px; }
    .slot2 { right: 70px; }

    .enemy {
      position: absolute;
      font-size: 40px;
      left: 50%;
      transform: translateX(-50%);
      transition: top 5s linear;
    }
    .enemy-hp {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: lime;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 8px;
    }

    .projectile {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #00ffff;
      border-radius: 50%;
      box-shadow: 0 0 8px cyan;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐹 Хомяки: Башня Обороны</h1>

    <div id="main-menu">
      <p>Золото: <span id="gold">200</span> 🪙 | Эпизод: <span id="episode">1</span></p>
      <p>🏰 Башня: <span id="tower-hp">100</span> ❤️</p>
      <button onclick="enterBattle()" style="background:#e74c3c;color:white;padding:15px 30px;font-size:20px;">🛡️ Защитить башню</button>
    </div>

    <div id="battle-screen" style="display:none;">
      <p>Волна: <span id="wave">1</span> | Врагов: <span id="enemies-left">0</span></p>

      <div id="battle-field">
        <div class="road"></div>
        <div style="position:absolute; bottom:110px; left:50%; transform:translateX(-50%); font-size:65px;">🏰</div>

        <div class="slot slot1" onclick="placeHamster(0)"></div>
        <div class="slot slot2" onclick="placeHamster(1)"></div>
      </div>

      <button onclick="startWave()" style="background:#27ae60;color:white;font-size:22px;padding:12px 40px;">▶️ Начать волну</button>
      <button onclick="exitBattle()">🔙 Выйти</button>
    </div>
  </div>

  <script>
    let gold = 200, episode = 1, towerHP = 100;
    let hamsters = { warrior: 2, archer: 1 };
    let placed = [];           // [null, "warrior", ...]
    let enemies = [];
    let attackIntervals = [];

    const types = {
      warrior: { name: "⚔️", color: "orange" },
      archer:  { name: "🏹", color: "cyan" }
    };

    function updateUI() {
      document.getElementById("gold").textContent = gold;
      document.getElementById("tower-hp").textContent = towerHP;
    }

    function enterBattle() {
      document.getElementById("main-menu").style.display = "none";
      document.getElementById("battle-screen").style.display = "block";
      placed = [null, null];
      document.querySelectorAll('.slot').forEach(s => s.innerHTML = '');
      enemies = [];
      updateUI();
    }

    function exitBattle() {
      document.getElementById("battle-screen").style.display = "none";
      document.getElementById("main-menu").style.display = "block";
      attackIntervals.forEach(i => clearInterval(i));
      attackIntervals = [];
    }

    function placeHamster(index) {
      let avail = Object.keys(hamsters).filter(t => hamsters[t] > 0);
      if (!avail.length) return alert("Нет хомяков!");

      let type = prompt("Кого поставить?\n- warrior (⚔️)\n- archer (🏹)", avail[0]);
      if (type && hamsters[type]) {
        hamsters[type]--;
        placed[index] = type;
        document.querySelectorAll('.slot')[index].innerHTML = types[type].name;
      }
    }

    function startWave() {
      let wave = parseInt(document.getElementById("wave").textContent);
      let count = wave === 1 ? 2 : wave === 2 ? 3 : 5;

      document.getElementById("enemies-left").textContent = count;

      for (let i = 0; i < count; i++) {
        setTimeout(() => spawnEnemy(), i * 900);
      }
    }

    function spawnEnemy() {
      let field = document.getElementById("battle-field");
      let enemy = document.createElement("div");
      enemy.className = "enemy";
      enemy.innerHTML = `🐛<div class="enemy-hp">3</div>`;
      enemy.style.top = "-50px";
      enemy.dataset.hp = 3;
      field.appendChild(enemy);
      enemies.push(enemy);

      setTimeout(() => { enemy.style.top = "480px"; }, 50);

      // Когда враг доходит до базы
      setTimeout(() => {
        if (enemy.parentNode) {
          enemy.parentNode.removeChild(enemy);
          enemies = enemies.filter(e => e !== enemy);
          towerHP = Math.max(0, towerHP - 8);
          document.getElementById("tower-hp").textContent = towerHP;
          if (towerHP <= 0) alert("💥 Башня уничтожена!");
        }
      }, 5200);
    }

    // === АВТОМАТИЧЕСКИЕ АТАКИ ХОМЯКОВ ===
    setInterval(() => {
      if (document.getElementById("battle-screen").style.display === "none") return;

      placed.forEach((type, index) => {
        if (!type) return;

        let slot = document.querySelectorAll('.slot')[index];
        let rect = slot.getBoundingClientRect();
        let fieldRect = document.getElementById("battle-field").getBoundingClientRect();

        if (type === "warrior") {
          // Ближний бой + Ветряная атака
          enemies.forEach(enemy => {
            let eRect = enemy.getBoundingClientRect();
            if (Math.abs(eRect.top - rect.top) < 120) {   // в ближнем радиусе
              let hp = parseFloat(enemy.dataset.hp);
              hp -= 1;
              enemy.dataset.hp = hp;
              enemy.querySelector('.enemy-hp').textContent = Math.ceil(hp);

              if (hp <= 0) {
                enemy.remove();
                enemies = enemies.filter(e => e !== enemy);
              }
            }
          });

          // Ветряная атака каждые 5 секунд (симулируем)
          if (Math.random() < 0.2) {
            enemies.forEach(enemy => {
              let hp = parseFloat(enemy.dataset.hp) - 2;
              enemy.dataset.hp = hp;
              enemy.querySelector('.enemy-hp').textContent = Math.ceil(hp);
              if (hp <= 0) enemy.remove();
            });
          }
        }

        if (type === "archer") {
          // Стрельба каждую секунду
          if (enemies.length > 0) {
            let target = enemies[enemies.length - 1]; // самый дальний (нижний)
            let hp = parseFloat(target.dataset.hp) - 0.5;
            target.dataset.hp = hp;
            target.querySelector('.enemy-hp').textContent = hp.toFixed(1);

            if (hp <= 0) target.remove();

            // Визуал снаряда
            let proj = document.createElement("div");
            proj.className = "projectile";
            proj.style.left = (rect.left - fieldRect.left + 30) + "px";
            proj.style.top = (rect.top - fieldRect.top + 20) + "px";
            document.getElementById("battle-field").appendChild(proj);

            setTimeout(() => proj.remove(), 600);
          }
        }
      });

      // Обновляем счётчик врагов
      document.getElementById("enemies-left").textContent = enemies.length;
    }, 1000);

    updateUI();
  </script>
</body>
</html>
